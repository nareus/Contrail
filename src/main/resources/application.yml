spring:
  application:
    name: aircraft-tracker-api

  datasource:
    url: jdbc:postgresql://localhost:5432/aircraftdb
    username: aircraft
    password: aircraft_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: none

opensky:
  base-url: https://opensky-network.org/api
  timeout-seconds: 10
  cache-ttl-seconds: 10

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

rate-limit:
  capacity: 100
  refill-tokens: 100
  refill-period-seconds: 60
