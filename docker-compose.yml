version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: aircraft_postgres
    environment:
      POSTGRES_DB: aircraftdb
      POSTGRES_USER: aircraft
      POSTGRES_PASSWORD: aircraft_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aircraft -d aircraftdb"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: aircraft_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

volumes:
  pgdata:
